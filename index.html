<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Wisata Batang</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        function showAdminModal() {
            const codeInput = document.getElementById('admin-code');
            const code = '021885'; // Admin code
            if (codeInput.value === code) {
                document.getElementById('admin-form').style.display = 'block';
            } else {
                alert('Incorrect code. Please try again.');
            }
        }
    </script>
</head>
<body>
    <h1>Welcome to Portal Wisata Batang</h1>
    <button onclick="showAdminModal()">Enter Admin Code</button>
    <div id="admin-form" style="display: none;">
        <h2>Admin Authentication</h2>
        <form>
            <!-- Admin form fields go here -->
            <input type="text" placeholder="Admin Content" required>
            <button type="submit">Submit</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
